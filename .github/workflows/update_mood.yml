name: Update Mood Graphic

on:
  schedule:
    # Runs every day at 7am UTC (adjust to your timezone if you like)
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Lets you trigger a refresh manually from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate mood graphic
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python generate_mood_graphic.py

      - name: Commit and push if changed
        run: |
          git config user.name  "mood-bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update mood graphic $(date -u '+%Y-%m-%d')"
          git push
