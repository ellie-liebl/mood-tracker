<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood · last 28 days</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    body {
      background: #120d1e;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 520px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f6a47c;
      opacity: 0.75;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: #a9bdc6;
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.45;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, transform 0.4s;
      line-height: 1;
    }
    .refresh-btn:hover { opacity: 0.9; }
    .refresh-btn.spinning { transform: rotate(360deg); }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      width: 100%;
      min-height: 60px;
      align-items: center;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      position: relative;
    }
    .cell:hover { transform: scale(1.15); box-shadow: 0 6px 20px rgba(0,0,0,0.6); z-index: 10; }

    .score {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      user-select: none;
    }

    .cell::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #221331;
      border: 1px solid #451c47;
      color: #f7c9aa;
      font-size: 0.72rem;
      padding: 5px 10px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 20;
    }
    .cell:hover::after { opacity: 1; }

    .legend { display: flex; align-items: center; gap: 5px; }
    .swatch { display: inline-block; width: 16px; height: 16px; border-radius: 3px; }
    .swatch.empty { margin-left: 6px; border: 1px solid rgba(169,189,198,0.3); }

    .updated { font-size: 0.65rem; color: #a9bdc6; opacity: 0.4; letter-spacing: 0.05em; }
    .loading-msg { font-size: 0.75rem; color: #a9bdc6; opacity: 0.5; grid-column: span 7; text-align: center; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>mood &mdash; last 28 days</h1>
    <button class="refresh-btn" id="refresh-btn" onclick="refresh()" title="Refresh">↺</button>
  </div>
  <div class="grid" id="grid"><span class="loading-msg">Loading…</span></div>
  <div class="legend" id="legend"></div>
  <div class="updated" id="updated"></div>
</div>

<script>
// ─── CONFIGURATION ────────────────────────────────────────────────────────────
const WORKER_URL = "https://notion-proxy.elizabethliebl.workers.dev";
const MOOD_DB    = "350e4f9c7c2d80d9b3bbf28153cf9163";

// Update these if your Notion property names differ
const DATE_PROPERTY    = "Date";
const MOOD_PROPERTY    = "Score (1-10)";
const SUMMARY_PROPERTY = "Mood (1 word)";

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const MOOD_COLORS = [
  "#221331","#451c47","#691f55","#921c5b","#b91657",
  "#d92847","#ed503e","#f47d57","#f6a47c","#f7c9aa",
];
const EMPTY_COLOR = "#a9bdc6";

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchEntries() {
  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - 27);

  const r = await fetch(`${WORKER_URL}/v1/databases/${MOOD_DB}/query`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      filter: { property: DATE_PROPERTY, date: { on_or_after: start.toISOString().split("T")[0] } },
      sorts:  [{ property: DATE_PROPERTY, direction: "ascending" }],
    }),
  });
  if (!r.ok) throw new Error(`API error ${r.status}`);
  const data = await r.json();

  const entries = {};
  for (const page of data.results || []) {
    const props   = page.properties;
    const dateStr = props[DATE_PROPERTY]?.date?.start?.slice(0, 10);
    if (!dateStr) continue;

    const scoreRaw = props[MOOD_PROPERTY]?.select?.name;
    const score    = scoreRaw ? parseInt(scoreRaw) : null;
    const summary  = (props[SUMMARY_PROPERTY]?.rich_text || [])
                       .map(t => t.plain_text).join("") || "";

    entries[dateStr] = { score, summary };
  }
  return entries;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(entries) {
  const today  = new Date();
  const grid   = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 27; i >= 0; i--) {
    const d     = new Date(today);
    d.setDate(d.getDate() - i);
    const key   = d.toISOString().split("T")[0];
    const entry = entries[key] || {};
    const score = entry.score ?? null;
    const color = score !== null ? MOOD_COLORS[Math.max(0, Math.min(9, score - 1))] : EMPTY_COLOR;
    const label = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });

    let tooltip = label;
    if (score !== null) tooltip += ` · ${score}`;
    if (entry.summary)  tooltip += ` · ${entry.summary}`;

    const cell = document.createElement("div");
    cell.className        = "cell";
    cell.style.background = color;
    cell.title            = tooltip;
    cell.innerHTML        = `<span class="score">${score !== null ? score : ""}</span>`;
    grid.appendChild(cell);
  }

  // Legend
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  MOOD_COLORS.forEach((c, i) => {
    const s = document.createElement("span");
    s.className        = "swatch";
    s.style.background = c;
    s.title            = `Mood ${i + 1}`;
    legend.appendChild(s);
  });
  const empty = document.createElement("span");
  empty.className        = "swatch empty";
  empty.style.background = EMPTY_COLOR;
  empty.title            = "No entry";
  legend.appendChild(empty);

  // Timestamp
  const now = new Date();
  document.getElementById("updated").textContent =
    "updated " +
    now.toLocaleDateString("en-US", { month: "short", day: "numeric" }) +
    " · " +
    now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}

// ─── LOAD & REFRESH ───────────────────────────────────────────────────────────
async function load() {
  try {
    const entries = await fetchEntries();
    render(entries);
  } catch(e) {
    document.getElementById("grid").innerHTML =
      `<span class="loading-msg">Could not load — try refreshing</span>`;
    console.error(e);
  }
}

async function refresh() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  await load();
  setTimeout(() => btn.classList.remove("spinning"), 400);
}

load();
</script>
</body>
</html>
