  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow: hidden; }

    body {
      background: #120d1e;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f6a47c;
      opacity: 0.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      width: 100%;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      position: relative;
    }

    .cell:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      z-index: 10;
    }

    .score {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      user-select: none;
    }

    /* custom tooltip */
    .cell::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #221331;
      border: 1px solid #451c47;
      color: #f7c9aa;
      font-size: 0.72rem;
      padding: 5px 10px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 20;
    }

    .cell:hover::after {
      opacity: 1;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .empty {
      margin-left: 6px;
      border: 1px solid rgba(169,189,198,0.3);
    }

    .updated {
      font-size: 0.65rem;
      color: #a9bdc6;
      opacity: 0.4;
      letter-spacing: 0.05em;
    }
  </style>
</head>
